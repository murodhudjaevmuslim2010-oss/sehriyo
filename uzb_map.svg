# 📍 Shahar: Toshkent
**Символ:** Bilim Darvozasi (Врата Знаний)
**Темы:** Алфавит, звуки, простые слова, базовые предложения.

## 📜 Сюжетное вступление (Kirish)
Путешествие начинается у величественных ворот старого Медресе Кукельдаш в центре Ташкента. Здесь пахнет старыми пергаментами и свежезаваренным чаем. Двери Медресе закрыты. Чтобы войти и начать свой путь к познанию тайн языка, странник должен доказать, что он чтит основы.

## 👤 NPC: Ustoz Mahmud (Наставник Махмуд)
*Опытный каллиграф и хранитель первых свитков. Он говорит спокойно, размеренно, каждое слово имеет вес. Одет в традиционный чапан.*

### 💬 Стартовый диалог
**Ustoz Mahmud:** «Xush kelibsiz, izlovchi (Добро пожаловать, искатель). Многие приходят к Вратам Знаний, но лишь те, чьё сердце открыто для учения, могут переступить порог. Язык — это ключ, а буквы — его выкованные узоры. Прежде чем строить великие дворцы мыслей, мы должны заложить крепкий фундамент. Tayyormisan? (Ты готов?)»

**Игрок (Выбор ответа):** 
1. «Mening qalbim bilimga ochilgan. Boshlaymiz.» (Моё сердце открыто знаниям. Начнём.)
2. «Men asoslarni o'rganishga tayyorman, Ustoz.» (Я готов изучить основы, Наставник.)

**Ustoz Mahmud:** «Yaxshi (Хорошо). Покажи мне, как ты чувствуешь основу нашего языка. Начнём с малого — с букв и звуков, которые хранят дыхание предков.»

---

## 📝 Задания (Sinovlar)

**Уровень 1: Узнавать (Алфавит и специфические звуки)**
*Тип: Выбор правильного ответа.*
**Ustoz Mahmud:** «Каждая буква имеет своё звучание. В нашем языке есть звуки, которые произносятся с глубины. Найди букву, которая звучит как твердое, глубокое "К".»
* **Варианты:** 
  A) X
  B) Q
  C) G‘
  D) H
* **Правильный ответ:** B (Q)

**Уровень 2: Строить (Простые слова)**
*Тип: Составление слова из букв.*
**Ustoz Mahmud:** «Сложи разрозненные символы воедино. Каноны мудрости передаются через это. Что называют сосудом знаний?»
* **Дано буквы:** O, T, K, I, B
* **Задача:** Собрать правильное слово.
* **Правильный ответ:** KITOB (Китоб - Книга)

**Уровень 3: Понимать (Базовый синтаксис)**
*Тип: Исправление порядка слов.*
**Ustoz Mahmud:** «Слова, как послушные ученики, должны стоять на своих местах. В нашем языке действие всегда завершает мысль. Исправь порядок слов в этом изречении.»
* **Текст с ошибкой:** Men o'qiyman kitobni. (Я читаю книгу - дословная калька).
* **Задача:** Расставить слова в правильном порядке.
* **Правильный ответ:** Men kitobni o'qiyman. (Ega + To'ldiruvchi + Kesim).

---

## ⚖️ Испытание (Katta Sinov - Финал города)
*Условие: Серия вопросов без права на ошибку. Игрок применяет всё, что изучил.*

**Ustoz Mahmud:** «Ты достойно справился с азами. Но Врата Знаний открываются только перед тем, кто не оступается в базовых вещах. Пройди этот путь до конца без единой ошибки.»

1. **Вопрос 1 (Звуки и орфография):** Какой гласной буквы не хватает в слове «B...lim» (Знание)? 
   * **Ответ:** i (Bilim)

2. **Вопрос 2 (Лексика - антонимы основ):** Утро (Tong) начинает день, а что его завершает (Вечер)?
   * **Варианты:** A) Kun, B) Oqshom / Kecha, C) Quyosh
   * **Ответ:** B (Oqshom / Kecha)

3. **Вопрос 3 (Синтаксис):** Собери предложение из блоков: [Ustoz] [berdi] [menga] [kitob]
   * **Ответ:** Ustoz menga kitob berdi. (Наставник дал мне книгу).

---

### 🚪 Завершение города
**Ustoz Mahmud:** «Sof aql va to‘g‘ri so‘z (Чистый разум и верное слово). Врата открыты. Ты усвоил основы, но это лишь первый шаг. Твой путь лежит дальше, в величественный Samarqand, где слова объединяются в реки мыслей, а грамматика возводит мосты. Oq yo'l (Счастливого пути)!»

*(Системно: Открывается переход на карту. Доступен следующий город — Samarqand).*
